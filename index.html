<meta charset="UTF-8">
<title>Eye Maze Horror FULL FIX</title>

<style>
body { margin:0; overflow:hidden; background:black; }

#info{
position:absolute;
top:10px; left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
font-family:monospace;
}

#screen{
position:fixed;
top:0; left:0;
width:100%; height:100%;
display:none;
justify-content:center;
align-items:center;
z-index:999;
}

#text{
color:white;
font-size:40px;
font-family:monospace;
animation:flash 0.5s infinite;
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:0.3;}
100%{opacity:1;}
}
</style>

</head>
<body>

<div id="info">WASD | Mysz | F = latarka | UCIEKAJ 👁️</div>

<div id="screen"><div id="text"></div></div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// =====================
// STATE
// =====================
let gameOver = false;
let gameWon = false;

// =====================
// 🔊 AUDIO (NAPRAWIONY SZUM)
// =====================
let noise = new Audio("https://cdn.pixabay.com/download/audio/2022/10/25/audio_6c4d3a1a0a.mp3?filename=dark-ambient-110989.mp3");
noise.loop = true;
noise.volume = 0.2;

// =====================
// SCENE
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 25);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(4,2,4);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// LABIRYNT
// =====================
let maze = [
"111111111111111",
"100000000000001",
"101111011111101",
"101000010000101",
"101011110111101",
"100010000100001",
"111010111101111",
"100000100000001",
"101111101111101",
"100000000000001",
"111111111111111"
];

let walls = [];
let size = 4;

maze.forEach((row,z)=>{
[...row].forEach((cell,x)=>{
if(cell==="1"){
let wall = new THREE.Mesh(
new THREE.BoxGeometry(size,4,size),
new THREE.MeshBasicMaterial({color:0x222222})
);
wall.position.set(x*size,2,z*size);
scene.add(wall);
walls.push(wall);
}
});
});

// =====================
// PORTAL
// =====================
let portal = new THREE.Mesh(
new THREE.TorusGeometry(1,0.4,16,32),
new THREE.MeshBasicMaterial({color:0x00aaff})
);
portal.position.set(52,2,52);
scene.add(portal);

// =====================
// COLLISION
// =====================
function isColliding(x,z){
for(let w of walls){
let dx = Math.abs(x - w.position.x);
let dz = Math.abs(z - w.position.z);
if(dx < 2 && dz < 2) return true;
}
return false;
}

// =====================
// FLASHLIGHT
// =====================
let flashlight = new THREE.SpotLight(0xffffff,2,20,Math.PI/6,0.5);
scene.add(flashlight);
let flashlightOn = true;

// =====================
// 👁️ MONSTER (EYE)
// =====================
let eye = new THREE.Group();

let eyeWhite = new THREE.Mesh(
new THREE.SphereGeometry(1.5,32,32),
new THREE.MeshBasicMaterial({color:0xffffff})
);

let pupil = new THREE.Mesh(
new THREE.SphereGeometry(0.5,32,32),
new THREE.MeshBasicMaterial({color:0x000000})
);

pupil.position.z = 1.2;

eye.add(eyeWhite);
eye.add(pupil);

eye.position.set(20,2,20);
scene.add(eye);

let monster = eye;

// =====================
// INPUT
// =====================
let keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="f") flashlightOn=!flashlightOn;
});
document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

// =====================
// START (FIX AUDIO HERE)
// =====================
document.body.onclick=()=>{
document.body.requestPointerLock();
noise.play();
};

// =====================
// MOUSE
// =====================
let yaw=0,pitch=0;

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){
yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;
pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
}
});

// =====================
// UPDATE
// =====================
function update(){

if(gameOver || gameWon) return;

// =====================
// MOVE
// =====================
let speed=0.1;
let newX=camera.position.x;
let newZ=camera.position.z;

if(keys["w"]){ newX-=Math.sin(yaw)*speed; newZ-=Math.cos(yaw)*speed; }
if(keys["s"]){ newX+=Math.sin(yaw)*speed; newZ+=Math.cos(yaw)*speed; }
if(keys["a"]){ newX-=Math.cos(yaw)*speed; newZ+=Math.sin(yaw)*speed; }
if(keys["d"]){ newX+=Math.cos(yaw)*speed; newZ-=Math.sin(yaw)*speed; }

if(!isColliding(newX,newZ)){
camera.position.x=newX;
camera.position.z=newZ;
}

camera.rotation.set(pitch,yaw,0);

// =====================
// AI
// =====================
let dx = camera.position.x - monster.position.x;
let dz = camera.position.z - monster.position.z;
let dist = Math.sqrt(dx*dx + dz*dz);

let speedAI = 0.03;
if(dist < 10) speedAI = 0.05;
if(dist < 5) speedAI = 0.08;

let nextX = monster.position.x + dx * speedAI;
let nextZ = monster.position.z + dz * speedAI;

if(!isColliding(nextX,nextZ)){
monster.position.x = nextX;
monster.position.z = nextZ;
}

monster.lookAt(camera.position);
pupil.lookAt(camera.position);

// =====================
// FLASHLIGHT FLICKER
// =====================
if(flashlightOn){

let flicker = 0;
if(dist < 15) flicker = 0.05;
if(dist < 10) flicker = 0.1;
if(dist < 6) flicker = 0.2;
if(dist < 3) flicker = 0.4;

if(Math.random() < flicker){
flashlight.intensity = Math.random()*2;
}else{
flashlight.intensity = 2;
}

if(dist < 2){
flashlight.intensity = 0.2;
}

flashlight.position.copy(camera.position);
flashlight.target.position.set(
camera.position.x - Math.sin(yaw),
camera.position.y,
camera.position.z - Math.cos(yaw)
);
scene.add(flashlight.target);

}else{
flashlight.intensity = 0;
}

// =====================
// 🔊 NOISE (WORKING)
// =====================
noise.volume = Math.max(0, 1 - dist/20);

// =====================
// LOSE
// =====================
if(dist < 1.5){

gameOver = true;

document.getElementById("screen").style.display="flex";
document.getElementById("screen").style.background="darkred";
document.getElementById("text").innerText="YOU WERE CAUGHT";

setTimeout(()=>location.reload(),2000);
}

// =====================
// WIN
// =====================
let px = camera.position.x - portal.position.x;
let pz = camera.position.z - portal.position.z;
let pdist = Math.sqrt(px*px + pz*pz);

if(pdist < 2){

gameWon = true;

document.getElementById("screen").style.display="flex";
document.getElementById("screen").style.background="green";
document.getElementById("text").innerText="YOU ESCAPED";

setTimeout(()=>location.reload(),3000);
}

}

// LOOP
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

</script>

</body>
</html>
