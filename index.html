<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Maze Horror</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#info {
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
font-family:monospace;
}
#jumpscare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:black;
z-index:999;
}
#jumpscare img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>
<body>

<div id="info">Kliknij → WASD | Mysz | F = latarka</div>

<div id="jumpscare">
<img src="https://i.imgur.com/3ZQ3Z6L.png">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// AUDIO
let ambient = new Audio("https://www.fesliyanstudios.com/play-mp3/4386");
ambient.loop = true;
ambient.volume = 0.3;

let stepSound = new Audio("https://www.fesliyanstudios.com/play-mp3/387");
let scareSound = new Audio("https://www.fesliyanstudios.com/play-mp3/6674");

// SCENA
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 25);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(4,2,4);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// PODŁOGA
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(200,200),
new THREE.MeshBasicMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// =====================
// LABIRYNT
// =====================
let maze = [
"111111111111111",
"100000000000001",
"101111011111101",
"101000010000101",
"101011110111101",
"100010000100001",
"111010111101111",
"100000100000001",
"101111101111101",
"100000000000001",
"111111111111111"
];

let walls = [];
let size = 4;

maze.forEach((row,z)=>{
[...row].forEach((cell,x)=>{
if(cell==="1"){
let wall = new THREE.Mesh(
new THREE.BoxGeometry(size,4,size),
new THREE.MeshBasicMaterial({color:0x222222})
);
wall.position.set(x*size,2,z*size);
scene.add(wall);
walls.push(wall);
}
});
});

// =====================
// KOLIZJA
// =====================
function isColliding(x,z){
for(let w of walls){
let dx = Math.abs(x - w.position.x);
let dz = Math.abs(z - w.position.z);
if(dx < 2 && dz < 2) return true;
}
return false;
}

// LATARKA
let flashlight = new THREE.SpotLight(0xffffff,2,20,Math.PI/6,0.5);
scene.add(flashlight);
let flashlightOn = true;

// POTWÓR
let monster = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,4,8),
new THREE.MeshBasicMaterial({color:0xffffff})
);
monster.position.set(20,2,20);
scene.add(monster);

// INPUT
let keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;
if(e.key==="f") flashlightOn=!flashlightOn;
});
document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

// START
document.body.onclick=()=>{
document.body.requestPointerLock();
ambient.play();
};

// MYSZ
let yaw=0,pitch=0;

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){
yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;
pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
}
});

// UPDATE
function update(){

// RUCH + KOLIZJA
let speed=0.1;
let newX=camera.position.x;
let newZ=camera.position.z;

if(keys["w"]){ newX-=Math.sin(yaw)*speed; newZ-=Math.cos(yaw)*speed; }
if(keys["s"]){ newX+=Math.sin(yaw)*speed; newZ+=Math.cos(yaw)*speed; }
if(keys["a"]){ newX-=Math.cos(yaw)*speed; newZ+=Math.sin(yaw)*speed; }
if(keys["d"]){ newX+=Math.cos(yaw)*speed; newZ-=Math.sin(yaw)*speed; }

if(!isColliding(newX,newZ)){
camera.position.x=newX;
camera.position.z=newZ;
}

// kroki
if(keys["w"]||keys["a"]||keys["s"]||keys["d"]){
if(Math.random()<0.02){
stepSound.currentTime=0;
stepSound.play();
}
}

// rotacja
camera.rotation.set(pitch,yaw,0);

// LATARKA
if(flashlightOn){
flashlight.intensity=2;
flashlight.position.copy(camera.position);
flashlight.target.position.set(
camera.position.x - Math.sin(yaw),
camera.position.y,
camera.position.z - Math.cos(yaw)
);
scene.add(flashlight.target);
}else{
flashlight.intensity=0;
}

// AI SLENDER
let dx = monster.position.x - camera.position.x;
let dz = monster.position.z - camera.position.z;
let dist = Math.sqrt(dx*dx + dz*dz);

let lookX = -Math.sin(yaw);
let lookZ = -Math.cos(yaw);
let dot = dx*lookX + dz*lookZ;
let looking = dot>0;

monster.visible = !looking;

if(dist>10 && !looking){
monster.position.set(
camera.position.x + Math.sin(yaw)*8,
2,
camera.position.z + Math.cos(yaw)*8
);
}

if(!looking){
monster.position.x += (camera.position.x - monster.position.x)*0.005;
monster.position.z += (camera.position.z - monster.position.z)*0.005;
}

// jumpscare
if(dist<1.2 && !looking){
document.getElementById("jumpscare").style.display="flex";
scareSound.play();
setTimeout(()=>location.reload(),1500);
}

// napięcie
ambient.volume = Math.max(0.1, 1 - dist/20);

}

// LOOP
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
