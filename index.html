<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Night Facility - Slender Horror</title>
<style>
body { margin:0; overflow:hidden; background:black; }
#info {
position:absolute;
top:10px;
left:10px;
color:white;
background:rgba(0,0,0,0.6);
padding:10px;
font-family:monospace;
}
#jumpscare{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
justify-content:center;
align-items:center;
background:black;
z-index:999;
}
#jumpscare img{
width:100%;
height:100%;
object-fit:cover;
}
</style>
</head>
<body>

<div id="info">Kliknij → WASD | Mysz | F = latarka</div>

<div id="jumpscare">
<img src="https://i.imgur.com/3ZQ3Z6L.png">
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.158/build/three.min.js"></script>

<script>

// =====================
// AUDIO
// =====================
let ambient = new Audio("https://www.fesliyanstudios.com/play-mp3/4386");
ambient.loop = true;
ambient.volume = 0.3;

let stepSound = new Audio("https://www.fesliyanstudios.com/play-mp3/387");
stepSound.volume = 0.2;

let scareSound = new Audio("https://www.fesliyanstudios.com/play-mp3/6674");

// =====================
// SCENA
// =====================
const scene = new THREE.Scene();
scene.fog = new THREE.Fog(0x000000, 5, 25);

const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);
camera.position.set(0,2,5);

const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// =====================
// PODŁOGA
// =====================
const floor = new THREE.Mesh(
new THREE.PlaneGeometry(100,100),
new THREE.MeshBasicMaterial({color:0x111111})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// =====================
// ŚCIANY
// =====================
for(let i=0;i<30;i++){
let wall = new THREE.Mesh(
new THREE.BoxGeometry(2,4,2),
new THREE.MeshBasicMaterial({color:0x222222})
);
wall.position.set(Math.random()*40-20,2,Math.random()*40-20);
scene.add(wall);
}

// =====================
// LATARKA
// =====================
let flashlight = new THREE.SpotLight(0xffffff,2,20,Math.PI/6,0.5);
scene.add(flashlight);
let flashlightOn = true;

// =====================
// POTWÓR (SLENDER)
// =====================
let monster = new THREE.Mesh(
new THREE.CylinderGeometry(0.5,0.5,4,8),
new THREE.MeshBasicMaterial({color:0xffffff})
);
monster.position.set(10,2,10);
scene.add(monster);

// =====================
// INPUT
// =====================
let keys={};

document.addEventListener("keydown",e=>{
keys[e.key.toLowerCase()]=true;

if(e.key==="f") flashlightOn = !flashlightOn;
});

document.addEventListener("keyup",e=>{
keys[e.key.toLowerCase()]=false;
});

// klik = start + audio
document.body.onclick=()=>{
document.body.requestPointerLock();
ambient.play();
};

// =====================
// MYSZ
// =====================
let yaw=0, pitch=0;

document.addEventListener("mousemove",e=>{
if(document.pointerLockElement===document.body){
yaw -= e.movementX*0.002;
pitch -= e.movementY*0.002;

pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
}
});

// =====================
// UPDATE
// =====================
function update(){

// ===== RUCH =====
let speed=0.1;

if(keys["w"]){
camera.position.x -= Math.sin(yaw)*speed;
camera.position.z -= Math.cos(yaw)*speed;
}
if(keys["s"]){
camera.position.x += Math.sin(yaw)*speed;
camera.position.z += Math.cos(yaw)*speed;
}
if(keys["a"]){
camera.position.x -= Math.cos(yaw)*speed;
camera.position.z += Math.sin(yaw)*speed;
}
if(keys["d"]){
camera.position.x += Math.cos(yaw)*speed;
camera.position.z -= Math.sin(yaw)*speed;
}

// kroki
if(keys["w"]||keys["a"]||keys["s"]||keys["d"]){
if(Math.random()<0.02){
stepSound.currentTime=0;
stepSound.play();
}
}

// rotacja
camera.rotation.set(pitch,yaw,0);

// ===== LATARKA =====
if(flashlightOn){
flashlight.intensity=2;
flashlight.position.copy(camera.position);
flashlight.target.position.set(
camera.position.x - Math.sin(yaw),
camera.position.y,
camera.position.z - Math.cos(yaw)
);
scene.add(flashlight.target);
}else{
flashlight.intensity=0;
}

// ===== AI SLENDER =====
let dx = monster.position.x - camera.position.x;
let dz = monster.position.z - camera.position.z;

let dist = Math.sqrt(dx*dx + dz*dz);

// czy patrzysz
let lookX = -Math.sin(yaw);
let lookZ = -Math.cos(yaw);

let dot = dx*lookX + dz*lookZ;
let looking = dot>0;

// znika gdy patrzysz
monster.visible = !looking;

// teleport za plecy
if(dist>10 && !looking){
monster.position.set(
camera.position.x + Math.sin(yaw)*8,
2,
camera.position.z + Math.cos(yaw)*8
);
}

// powolne zbliżanie
if(!looking){
monster.position.x += (camera.position.x - monster.position.x)*0.005;
monster.position.z += (camera.position.z - monster.position.z)*0.005;
}

// jumpscare
if(dist<1.2 && !looking){

document.getElementById("jumpscare").style.display="flex";
scareSound.play();

renderer.domElement.style.filter="brightness(5)";

setTimeout(()=>{
location.reload();
},1500);
}

// napięcie audio
ambient.volume = Math.max(0.1, 1 - dist/20);

}

// =====================
// LOOP
// =====================
function animate(){
requestAnimationFrame(animate);
update();
renderer.render(scene,camera);
}
animate();

</script>
</body>
</html>
